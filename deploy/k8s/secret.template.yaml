# PM4Wasm SaaS – Kubernetes Secret Template
# IMPORTANT: Create actual secrets with:
# kubectl create secret generic pm4wasm-secrets --from-env-file=.env.prod -n pm4wasm
#
# Required environment variables in .env.prod:
# POSTGRES_PASSWORD
# JWT_SECRET
# JWT_REFRESH_SECRET
# GOOGLE_OAUTH_CLIENT_SECRET
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# SENTRY_DSN (optional)
# ENCRYPTION_KEY (for data at rest)

apiVersion: v1
kind: Secret
metadata:
  name: pm4wasm-secrets
  namespace: pm4wasm
type: Opaque
stringData:
  # Database
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # JWT
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION_USE_256_BIT_RANDOM"
  JWT_REFRESH_SECRET: "CHANGE_ME_IN_PRODUCTION_USE_256_BIT_RANDOM"

  # OAuth
  GOOGLE_OAUTH_CLIENT_ID: "your-google-oauth-client-id.apps.googleusercontent.com"
  GOOGLE_OAUTH_CLIENT_SECRET: "CHANGE_ME_IN_PRODUCTION"

  # Stripe
  STRIPE_SECRET_KEY: "sk_live_CHANGE_ME_IN_PRODUCTION"
  STRIPE_WEBHOOK_SECRET: "whsec_CHANGE_ME_IN_PRODUCTION"
  STRIPE_PRICE_ID_PRO: "price_CHANGE_ME"
  STRIPE_PRICE_ID_ENTERPRISE: "price_CHANGE_ME"

  # Encryption (for sensitive data at rest)
  ENCRYPTION_KEY: "CHANGE_ME_32_BYTE_HEX_STRING"

  # Monitoring
  SENTRY_DSN: "https://CHANGE_ME@sentry.io/CHANGE_ME"

---
# TLS Certificate Secret (for HTTPS)
# Use cert-manager or manually provision certificates
apiVersion: v1
kind: Secret
metadata:
  name: pm4wasm-tls
  namespace: pm4wasm
type: kubernetes.io/tls
data:
  tls.crt: LS0tLS1CRUdJTi... # Base64 encoded certificate
  tls.key: LS0tLS1CRUdJTi... # Base64 encoded private key

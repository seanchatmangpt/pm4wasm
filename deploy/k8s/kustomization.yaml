# PM4Wasm SaaS – Kustomization for Production Deployment
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pm4wasm

resources:
# Core infrastructure
- namespace.yaml
- configmap.yaml
- secret.template.yaml

# API
- api-deployment.yaml
- api-service.yaml

# Database & Cache
- postgres-deployment.yaml
- redis-deployment.yaml

# Monitoring
- monitoring.yaml

# Labels applied to all resources
commonLabels:
  app.kubernetes.io/name: pm4wasm
  app.kubernetes.io/component: saas-platform
  app.kubernetes.io/managed-by: kustomize
  environment: production

images:
- name: ghcr.io/pm4py/pm4wasm-api
  newTag: latest

# Replicas override for production
replicas:
- name: pm4wasm-api
  count: 3

# Resource patches for production
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: pm4wasm-api
    spec:
      template:
        spec:
          containers:
          - name: api
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                cpu: 2000m
                memory: 4Gi
  target:
    kind: Deployment
    name: pm4wasm-api

# ConfigMap generator
configMapGenerator:
- name: pm4wasm-env
  literals:
  - NODE_ENV=production
  - PORT=3000
  - LOG_LEVEL=info
  - ENABLE_METRICS=true

# PM4Wasm SaaS – Kubernetes ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: pm4wasm-config
  namespace: pm4wasm
data:
  # Environment
  NODE_ENV: "production"
  PORT: "3000"

  # Database
  DATABASE_URL: "postgresql://pm4wasm:${POSTGRES_PASSWORD}@postgres:5432/pm4wasm?schema=public"

  # Redis
  REDIS_URL: "redis://redis:6379"

  # JWT
  JWT_ACCESS_EXPIRY: "15m"
  JWT_REFRESH_EXPIRY: "7d"

  # CORS
  CORS_ORIGINS: "https://pm4py.org,https://saas.pm4py.org"

  # OAuth
  GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID}"
  GOOGLE_OAUTH_CALLBACK_URL: "https://api.pm4py.org/v1/auth/oauth/google/callback"

  # Stripe
  STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
  STRIPE_PRICE_ID_PRO: "${STRIPE_PRICE_ID_PRO}"
  STRIPE_PRICE_ID_ENTERPRISE: "${STRIPE_PRICE_ID_ENTERPRISE}"

  # Monitoring
  SENTRY_DSN: "${SENTRY_DSN}"
  SENTRY_ENVIRONMENT: "production"

  # Rate Limiting
  RATE_LIMIT_TTL: "60"
  RATE_LIMIT_MAX: "100"

---
# ConfigMap for Prometheus
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: pm4wasm
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'pm4wasm-production'
        replica: '1'

    scrape_configs:
      - job_name: 'pm4wasm-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - pm4wasm
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: pm4wasm-api
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:3000
        metrics_path: '/metrics'

      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres-exporter:9187']

      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter:9121']

    rule_files:
      - '/etc/prometheus/rules/*.yml'

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

---
# ConfigMap for Grafana
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: pm4wasm
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

---
# ConfigMap for Grafana Dashboards
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: pm4wasm
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'PM4Wasm'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards

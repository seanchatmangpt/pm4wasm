# PM4Wasm SaaS – PostgreSQL Deployment (Production)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: pm4wasm
  labels:
    app: postgres
    tier: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      securityContext:
        fsGroup: 999
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - name: postgres
          containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: pm4wasm
        - name: POSTGRES_USER
          value: pm4wasm
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pm4wasm-secrets
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U pm4wasm -d pm4wasm
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U pm4wasm -d pm4wasm
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: gp3-encrypted
      resources:
        requests:
          storage: 100Gi

---
# Service for PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pm4wasm
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: postgres
    protocol: TCP
  selector:
    app: postgres

---
# PostgreSQL Exporter for Prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: pm4wasm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
      - name: exporter
        image: prometheuscommunity/postgres-exporter:latest
        env:
        - name: DATA_SOURCE_NAME
          value: "postgresql://pm4wasm:$(POSTGRES_PASSWORD)@postgres:5432/pm4wasm?sslmode=disable"
        envFrom:
        - secretKeyRef:
            name: pm4wasm-secrets
            key: POSTGRES_PASSWORD
        ports:
        - name: metrics
          containerPort: 9187
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

---
# Service for PostgreSQL Exporter
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: pm4wasm
spec:
  type: ClusterIP
  ports:
  - port: 9187
    targetPort: metrics
    protocol: TCP
  selector:
    app: postgres-exporter
